baseURL = 'https://tingdonghu.github.io/' # 部署时记得改回你的域名
locale = 'zh-cn'
title = '古月月仔的博客'
theme = "dream-3.13.0" # 确保文件夹名字匹配，通常是 dream

# 排除非文章文件(图像生成prompts/系列outline/README/演讲草稿),避免被当文章渲染产生0001空归档
ignoreFiles = ['/prompts/', 'outline\.md$', '/README\.md$', 'RCL组会报告演讲稿\.md$']

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[params]
  math = true  # 开启主题内置的数学公式渲染支持
  # --- 1. 核心显示配置 (由 LoveIt 的 profile 迁移而来) ---
  author = "古月月仔"
  headerTitle = "古月月仔的博客"
  motto = "计算机在校生 || 游戏程序员" # 对应 LoveIt 的 subtitle + description
  avatar = "/img/ChipDog.jpg" # 确保文件在 static/img/ChipDog.jpg
  
  # --- 2. 主题皮肤配置 ---
  # Dream 使用 DaisyUI 颜色体系，可选: emerald, forest, cupcake, lo-fi 等
  lightTheme = "emerald"
  darkTheme = "forest"
  # 告诉 Dream 主题加载你的自定义样式
  customCSS = ["css/custom.css"]

  # --- 3. 社交链接 (Dream 直接在 params 下定义) ---
  email = "2680957536@qq.com"
  github = "TingDongHu"
  zhihu = "lin-chu-xin-44-90"
  # bilibili 在某些 Dream 版本中需自定义，若不显示可放 header 或 footer
  # bilibili = "473408368" 

  # --- 4. 站点选项 ---
  siteStartYear = 2021
  # 如果不想在首页卡片显示默认占位图，取消下面注释
  # noDefaultSummaryCover = true

  # --- 4b. 阅读体验开关 (子项目A: 启用主题内置功能) ---
  showTableOfContents = true   # 长文目录,复习时快速跳转
  imageZoomableInPost  = true  # 文章内图片点击放大(信息图/截图多)
  showPrevNextPost     = true  # 上一篇/下一篇导航
  stickyNav            = true  # 导航栏滚动吸顶
  rss                  = true  # 显示导航栏 RSS 图标(feed 已自动生成)

# --- 5. 菜单配置 ---
# 注意: Dream 主题不读 Hugo 的 [menu] 块,导航由 nav.html 的默认列表
# ["about","search","rss","posts","categories","tags"] 驱动,需重排时用 params.reorderNavItems。

[markup]
  [markup.goldmark.renderer]
      unsafe = true  # 允许在 Markdown 中直接使用 HTML 标签
  [markup.goldmark]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$'], ['\\[', '\\]']]
        inline = [['$', '$'], ['\\(', '\\)']]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true  # 确保这个是 true
    noClasses = false
    style = "monokai" # 或者 dracula, github-dark


[module]
  [[module.mounts]]
    source = "content"
    target = "static"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"